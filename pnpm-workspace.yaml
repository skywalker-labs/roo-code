packages:
  - "src" # Should be apps/vscode
  - "webview-ui" # Should be apps/vscode-webview
  - "apps/*"
  - "packages/*"
allowBuilds:
  '@tailwindcss/oxide': true
  '@vscode/ripgrep': true
  '@vscode/vsce-sign': true
  core-js: true
  esbuild: true
  keytar: true
  puppeteer-chromium-resolver: true
overrides:
  tar-fs: ">=3.1.1"
  esbuild: ">=0.25.0"
  undici: ">=5.29.0"
  brace-expansion: "^2.0.2"
  form-data: ">=4.0.4"
  bluebird: ">=3.7.2"
  glob: ">=11.1.0"
  "@types/react": "^18.3.23"
  "@types/react-dom": "^18.3.5"
  csstype: "3.1.3"
  zod: "3.25.76"
minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.9.15'
  - '@turbo/darwin-arm64@2.9.15'
  - '@turbo/linux-64@2.9.15'
  - '@turbo/linux-arm64@2.9.15'
  - '@turbo/windows-64@2.9.15'
  - '@turbo/windows-arm64@2.9.15'
  - turbo@2.9.15
