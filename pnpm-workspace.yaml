packages:
  - "src" # Should be apps/vscode
  - "webview-ui" # Should be apps/vscode-webview
  - "apps/*"
  - "packages/*"
allowBuilds:
  '@tailwindcss/oxide': true
  '@vscode/ripgrep': true
  '@vscode/vsce-sign': true
  core-js: true
  esbuild: true
  keytar: true
  puppeteer-chromium-resolver: true
overrides:
  tar-fs: ">=3.1.1"
  esbuild: ">=0.25.0"
  undici: ">=7.0.0"
  brace-expansion: "^2.0.2"
  form-data: ">=4.0.4"
  bluebird: ">=3.7.2"
  glob: ">=11.1.0"
  "@types/react": "^18.3.23"
  "@types/react-dom": "^18.3.5"
  csstype: "3.1.3"
  zod: "3.25.76"
  basic-ftp: ">=6.0.1"
  fast-xml-parser: ">=5.8.0"
  flatted: ">=3.4.0"
  lodash: ">=4.18.1"
  lodash-es: ">=4.18.1"
  minimatch: ">=9.0.9"
  rollup: ">=4.45.0"
  serialize-javascript: ">=7.0.0"
  tar: ">=7.5.0"
  tmp: ">=0.2.7"
  vite: ">=6.4.2"
  "@xmldom/xmldom": ">=0.9.0"
minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.9.15'
  - '@turbo/darwin-arm64@2.9.15'
  - '@turbo/linux-64@2.9.15'
  - '@turbo/linux-arm64@2.9.15'
  - '@turbo/windows-64@2.9.15'
  - '@turbo/windows-arm64@2.9.15'
  - turbo@2.9.15
